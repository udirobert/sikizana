name: sikizana
description: AI-Powered Decentralized Arbitration for Kenyan Chamas.
version: 1.0.0

# Antigravity Agent Configuration
agent:
  name: arbitrator
  model: gemini-1.5-pro # Preferred for XPRIZE Build with Gemini
  system_instruction_path: src/agents/prompts/arbitrator_v2.txt

# Definition of capabilities/tools the agent can use
tools:
  - name: analyze_mpesa_records
    description: Analyzes financial records (CSV/PDF) to verify contributions and loan repayments.
    module: src.tools.finance
  - name: bylaw_retriever
    description: Searches chama governance documents (bylaws) using RAG.
    module: src.tools.rag_engine
  - name: submit_verdict_to_blockchain
    description: Records the final mediation verdict on the Vara Network for transparency.
    module: src.agents.arbitrator
  - name: initiate_premium_resolution
    description: Triggers a paid 'Professional Arbitration' workflow via M-Pesa.
    module: src.tools.payments

# Deployment Settings for Google Cloud Run
runtime:
  type: cloud_run
  region: us-central1
  memory: 512Mi
