# Sikizana — full-stack VPS deployment
# Backend: FastAPI on exotic port 18081 (internal)
# Frontend: Next.js standalone on exotic port 13001 (internal)
# Both served via Coolify's Traefik proxy on sikizana.persidian.com
# Traefik routes via Docker network names, so host ports are only
# for direct debugging — kept exotic to avoid conflicts with other projects.

services:
  sikizana-api:
    build: .
    container_name: sikizana-api
    restart: unless-stopped
    ports:
      # Localhost only: direct host access would bypass Traefik (no TLS,
      # HSTS, or CORS) and let clients spoof X-Forwarded-For to defeat
      # the per-IP rate limiter. Traefik routes via the Docker network.
      - "127.0.0.1:18081:8081"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-meta/llama-3.1-70b-instruct}
      - NVIDIA_FALLBACK_MODEL=${NVIDIA_FALLBACK_MODEL:-qwen/qwen3-next-80b-a3b-instruct}
      - VENICE_API_KEY=${VENICE_API_KEY}
      - VENICE_MODEL=${VENICE_MODEL:-llama-3.3-70b}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - XERO_KEY_STORAGE=file
      - PAYMENT_DB_PATH=/app/data/payments.db
      # Production security settings
      - ALLOWED_ORIGINS=https://sikizana.persidian.com
      - COOKIE_SECURE=true
      - XERO_WEBHOOK_KEY=${XERO_WEBHOOK_KEY}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      # Sessions allowed to read the operator's org via the mounted CLI
      # profile (comma-separated). Unset = CLI fallback disabled; anonymous
      # visitors always get demo data, never the operator's books.
      - CLI_SESSION_IDS=${CLI_SESSION_IDS:-}
      # AP Integrity rollout controls. Empty allowlist = open rollout; set
      # explicit design-partner user IDs for a controlled cohort.
      - AP_INTEGRITY_USER_IDS=${AP_INTEGRITY_USER_IDS:-}
      - AP_INTEGRITY_DISABLED=${AP_INTEGRITY_DISABLED:-false}
      # Outbound email (chase sequences + weekly digest) via Postmark SMTP.
      # Values live in the VPS .env, never in git. Unset = email loops
      # log-and-skip safely.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # UK tax rates (configurable, set by HMRC)
      - CORP_TAX_SMALL_RATE=0.19
      - CORP_TAX_MAIN_RATE=0.25
      - CORP_TAX_SMALL_LIMIT=50000
      - CORP_TAX_MAIN_LIMIT=250000
      - CORP_TAX_MARGINAL_RELIEF=0.015
      - BANK_RATE=5.25
      # Supermemory (persistent memory + RAG)
      - SUPERMEMORY_URL=${SUPERMEMORY_URL:-}
      - SUPERMEMORY_API_KEY=${SUPERMEMORY_API_KEY:-}
    volumes:
      # Container runs as non-root `app` (uid 1001) — CLI profile mounts
      # into its home, not /root
      - /home/linuxuser/.config/xero-command-line:/home/app/.config/xero-command-line
      - sikizana-data:/app/data
    networks:
      - coolify
      - sikizana

  sikizana-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sikizana-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:13001:3000"
    environment:
      # Empty = same-origin /api calls via Traefik. Do NOT set to Docker
      # internal URL — the browser can't resolve container names.
      - NEXT_PUBLIC_API_BASE=
      - PORT=3000
    depends_on:
      - sikizana-api
    labels:
      # HSTS: enforce HTTPS for 1 year, include subdomains
      - traefik.http.middlewares.sikizana-hsts.headers.stsSeconds=31536000
      - traefik.http.middlewares.sikizana-hsts.headers.stsIncludeSubdomains=true
      - traefik.http.routers.sikizana-web.middlewares=sikizana-hsts
    networks:
      - coolify
      - sikizana

volumes:
  sikizana-data:

networks:
  sikizana:
    driver: bridge
  coolify:
    external: true
