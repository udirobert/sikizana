# Sikizana Books — full-stack VPS deployment
# Backend: FastAPI on exotic port 18081 (internal)
# Frontend: Next.js standalone on exotic port 13001 (internal)
# Both served via Coolify's Traefik proxy on sikizana.persidian.com
# Traefik routes via Docker network names, so host ports are only
# for direct debugging — kept exotic to avoid conflicts with other projects.

services:
  sikizana-api:
    build: .
    container_name: sikizana-api
    restart: unless-stopped
    ports:
      - "18081:8081"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - XERO_KEY_STORAGE=file
      - PAYMENT_DB_PATH=/app/data/payments.db
    volumes:
      # Container runs as non-root `app` (uid 1001) — CLI profile mounts
      # into its home, not /root
      - /home/linuxuser/.config/xero-command-line:/home/app/.config/xero-command-line
      - sikizana-data:/app/data
    networks:
      - coolify
      - sikizana

  sikizana-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sikizana-web
    restart: unless-stopped
    ports:
      - "13001:3000"
    environment:
      # Empty = same-origin /api calls via Traefik. Do NOT set to Docker
      # internal URL — the browser can't resolve container names.
      - NEXT_PUBLIC_API_BASE=
      - PORT=3000
    depends_on:
      - sikizana-api
    networks:
      - coolify
      - sikizana

volumes:
  sikizana-data:

networks:
  sikizana:
    driver: bridge
  coolify:
    external: true
