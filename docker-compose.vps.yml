# Sikizana Books — VPS deployment via Docker Compose
# Uses Coolify's Traefik proxy for HTTPS on sikizana.persidian.com
# Port 8081 is exposed directly for fallback/HTTP access.
services:
  sikizana-api:
    build: .
    container_name: sikizana-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - XERO_KEY_STORAGE=file
      - PAYMENT_DB_PATH=/app/data/payments.db
    volumes:
      # Mount Xero CLI config (tokens + encryption key) from host
      - /home/linuxuser/.config/xero-command-line:/root/.config/xero-command-line:ro
      # Persist SQLite database
      - sikizana-data:/app/data
    networks:
      - coolify
      - sikizana

volumes:
  sikizana-data:

networks:
  sikizana:
    driver: bridge
  coolify:
    external: true
