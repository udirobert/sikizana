# Sikizana Books — full-stack VPS deployment
# Backend: FastAPI on port 8081
# Frontend: Next.js standalone on port 3000
# Both served via Coolify's Traefik proxy on sikizana.persidian.com

services:
  sikizana-api:
    build: .
    container_name: sikizana-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - XERO_KEY_STORAGE=file
      - PAYMENT_DB_PATH=/app/data/payments.db
    volumes:
      - /home/linuxuser/.config/xero-command-line:/root/.config/xero-command-line:ro
      - sikizana-data:/app/data
    networks:
      - coolify
      - sikizana

  sikizana-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sikizana-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://sikizana-api:8081
      - PORT=3000
    depends_on:
      - sikizana-api
    networks:
      - coolify
      - sikizana

volumes:
  sikizana-data:

networks:
  sikizana:
    driver: bridge
  coolify:
    external: true
