# Sikizana Books — full-stack VPS deployment
# Backend: FastAPI on exotic port 18081 (internal)
# Frontend: Next.js standalone on exotic port 13001 (internal)
# Both served via Coolify's Traefik proxy on sikizana.persidian.com
# Traefik routes via Docker network names, so host ports are only
# for direct debugging — kept exotic to avoid conflicts with other projects.

services:
  sikizana-api:
    build: .
    container_name: sikizana-api
    restart: unless-stopped
    ports:
      - "18081:8081"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-meta/llama-3.3-70b-instruct}
      - NVIDIA_FALLBACK_MODEL=${NVIDIA_FALLBACK_MODEL:-meta/llama-3.1-70b-instruct}
      - VENICE_API_KEY=${VENICE_API_KEY}
      - VENICE_MODEL=${VENICE_MODEL:-llama-3.3-70b}
      - XERO_KEY_STORAGE=file
      - PAYMENT_DB_PATH=/app/data/payments.db
      # Production security settings
      - ALLOWED_ORIGINS=https://sikizana.persidian.com
      - COOKIE_SECURE=true
      - XERO_WEBHOOK_KEY=${XERO_WEBHOOK_KEY}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      # UK tax rates (configurable, set by HMRC)
      - CORP_TAX_SMALL_RATE=0.19
      - CORP_TAX_MAIN_RATE=0.25
      - CORP_TAX_SMALL_LIMIT=50000
      - CORP_TAX_MAIN_LIMIT=250000
      - CORP_TAX_MARGINAL_RELIEF=0.015
      - BANK_RATE=5.25
    volumes:
      # Container runs as non-root `app` (uid 1001) — CLI profile mounts
      # into its home, not /root
      - /home/linuxuser/.config/xero-command-line:/home/app/.config/xero-command-line
      - sikizana-data:/app/data
    networks:
      - coolify
      - sikizana

  sikizana-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sikizana-web
    restart: unless-stopped
    ports:
      - "13001:3000"
    environment:
      # Empty = same-origin /api calls via Traefik. Do NOT set to Docker
      # internal URL — the browser can't resolve container names.
      - NEXT_PUBLIC_API_BASE=
      - PORT=3000
    depends_on:
      - sikizana-api
    labels:
      # HSTS: enforce HTTPS for 1 year, include subdomains
      - traefik.http.middlewares.sikizana-hsts.headers.stsSeconds=31536000
      - traefik.http.middlewares.sikizana-hsts.headers.stsIncludeSubdomains=true
      - traefik.http.routers.sikizana-web.middlewares=sikizana-hsts
    networks:
      - coolify
      - sikizana

volumes:
  sikizana-data:

networks:
  sikizana:
    driver: bridge
  coolify:
    external: true
